<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>שחמט נגד רובוט</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      margin-top: 20px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      margin-top: 10px;
      padding: 8px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>שחמט נגד רובוט 🤖♟️</h2>

<div id="status">תור: שחקן</div>

<button onclick="playExampleMove()">נסה מהלך לדוגמה (e4)</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>

<script>
const game = new Chess();

const statusEl = document.getElementById("status");

// עדכון מצב
function updateStatus() {
  if (game.game_over()) {
    statusEl.innerText = "המשחק נגמר!";
  } else {
    statusEl.innerText = "תור: שחקן";
  }
}

// מהלך שחקן
function playerMove(move) {
  const result = game.move(move);

  if (!result) {
    alert("מהלך לא חוקי!");
    return;
  }

  console.log("Player:", move);

  updateStatus();

  setTimeout(botMove, 500);
}

// מהלך רובוט
function botMove() {
  const moves = game.moves();

  if (moves.length === 0) return;

  const randomMove = moves[Math.floor(Math.random() * moves.length)];
  game.move(randomMove);

  console.log("Bot:", randomMove);

  updateStatus();
}

// כפתור בדיקה
function playExampleMove() {
  playerMove("e4");
}

// התחלה
updateStatus();
</script>

</body>
</html>
