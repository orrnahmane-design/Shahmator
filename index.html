<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>לוח שחמט אמיתי</title>

  <!-- chessboard.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.css">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f2f2f2;
    }

    #board {
      width: 400px;
      margin: 20px auto;
    }

    #status {
      font-size: 18px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>שחמט ♟️</h2>

<div id="board"></div>
<div id="status">תור: לבן</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard.min.js"></script>

<script>
const game = new Chess();
const statusEl = document.getElementById("status");

function updateStatus() {
  if (game.in_checkmate()) {
    statusEl.innerText = "מט! המשחק נגמר";
  } else if (game.in_draw()) {
    statusEl.innerText = "תיקו";
  } else {
    statusEl.innerText = "תור: " + (game.turn() === 'w' ? "לבן" : "שחור");
  }
}

// יצירת הלוח
const board = Chessboard('board', {
  draggable: true,
  position: 'start',

  onDragStart: function (source, piece) {
    // מונע הזזה לא בתור שלך
    if (game.game_over()) return false;

    if (game.turn() === 'w' && piece.startsWith('b')) return false;
    if (game.turn() === 'b' && piece.startsWith('w')) return false;
  },

  onDrop: function (source, target) {
    const move = game.move({
      from: source,
      to: target,
      promotion: 'q'
    });

    if (move === null) return 'snapback';

    updateStatus();
  },

  onSnapEnd: function () {
    board.position(game.fen());
  }
});

updateStatus();
</script>

</body>
</html>
