<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>שחמט נגד רובוט</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      margin-top: 20px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
    }

    button {
      margin-top: 15px;
      padding: 10px 18px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h2>שחמט נגד רובוט 🤖♟️</h2>

<div id="status">מוכן למשחק</div>

<button onclick="startGame()">התחל משחק (e4)</button>

<script src="https://cdn.jsdelivr.net/npm/chess.js@0.13.4/chess.min.js"></script>

<script>
const game = new Chess();
const statusEl = document.getElementById("status");

function updateStatus(text) {
  statusEl.innerText = text;
}

// מהלך של הרובוט
function botMove() {
  if (game.game_over()) {
    updateStatus("המשחק נגמר");
    return;
  }

  const moves = game.moves();

  if (moves.length === 0) return;

  const randomMove = moves[Math.floor(Math.random() * moves.length)];
  game.move(randomMove);

  console.log("Bot played:", randomMove);

  updateStatus("הרובוט שיחק: " + randomMove);
}

// מהלך של השחקן
function playerMove(move) {
  const result = game.move(move);

  if (!result) {
    updateStatus("מהלך לא חוקי ❌");
    return;
  }

  console.log("Player played:", move);

  updateStatus("השחקן שיחק: " + move);

  setTimeout(botMove, 700);
}

// התחלת משחק
function startGame() {
  game.reset();
  updateStatus("התחלת משחק...");

  setTimeout(() => {
    playerMove("e4");
  }, 500);
}
</script>

</body>
</html>
